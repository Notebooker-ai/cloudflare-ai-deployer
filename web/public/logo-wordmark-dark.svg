<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1990 200" fill="none">
  <defs>
    <linearGradient id="notebookGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#bd34fe"/>
      <stop offset="100%" stop-color="#41d1ff"/>
    </linearGradient>
  </defs>
  <!-- Icon (square notebook) at 200x200, top-left at (0,0) -->
  <g transform="scale(0.390625)">
    <rect width="512" height="512" rx="112" fill="url(#notebookGradient)"/>
    <path d="M 0 112 A 112 112 0 0 1 112 0 L 128 0 L 128 512 L 112 512 A 112 112 0 0 1 0 400 Z" fill="rgba(0,0,0,0.15)"/>
    <g fill="#ffffff">
      <ellipse cx="64" cy="76" rx="22" ry="14"/>
      <ellipse cx="64" cy="148" rx="22" ry="14"/>
      <ellipse cx="64" cy="220" rx="22" ry="14"/>
      <ellipse cx="64" cy="292" rx="22" ry="14"/>
      <ellipse cx="64" cy="364" rx="22" ry="14"/>
      <ellipse cx="64" cy="436" rx="22" ry="14"/>
    </g>
    <g fill="url(#notebookGradient)">
      <ellipse cx="64" cy="76" rx="10" ry="6"/>
      <ellipse cx="64" cy="148" rx="10" ry="6"/>
      <ellipse cx="64" cy="220" rx="10" ry="6"/>
      <ellipse cx="64" cy="292" rx="10" ry="6"/>
      <ellipse cx="64" cy="364" rx="10" ry="6"/>
      <ellipse cx="64" cy="436" rx="10" ry="6"/>
    </g>
    <g stroke="#ffffff" stroke-width="3.5" opacity="0.6">
      <line x1="320" y1="126" x2="240" y2="196"/>
      <line x1="320" y1="126" x2="400" y2="196"/>
      <line x1="240" y1="196" x2="320" y2="286"/>
      <line x1="400" y1="196" x2="320" y2="286"/>
    </g>
    <g class="nodes">
      <circle cx="320" cy="126" r="30" fill="#ffffff"/>
      <circle cx="320" cy="126" r="38" stroke="#ffffff" stroke-width="2" fill="none" opacity="0.5"/>
      <circle cx="240" cy="196" r="24" fill="#ffffff"/>
      <circle cx="240" cy="196" r="32" stroke="#ffffff" stroke-width="2" fill="none" opacity="0.5"/>
      <circle cx="400" cy="196" r="24" fill="#ffffff"/>
      <circle cx="400" cy="196" r="32" stroke="#ffffff" stroke-width="2" fill="none" opacity="0.5"/>
      <circle cx="320" cy="286" r="27" fill="#ffffff"/>
      <circle cx="320" cy="286" r="35" stroke="#ffffff" stroke-width="2" fill="none" opacity="0.5"/>
    </g>
    <g stroke="#ffffff" stroke-width="4" stroke-linecap="round" opacity="0.4">
      <line x1="192" y1="366" x2="448" y2="366"/>
      <line x1="192" y1="394" x2="448" y2="394"/>
      <line x1="240" y1="422" x2="400" y2="422"/>
    </g>
  </g>
  <!-- Wordmark in Newsreader 700 (embedded woff2 subset; cap height 167.5px at 250px, baseline y=183.75 centers it in the 200 viewBox) -->
  <text x="244" y="183.75" font-family="Newsreader, Georgia, 'Times New Roman', serif" font-size="250" font-weight="700">
    <tspan fill="#f9fafb">Notebooker</tspan><tspan fill="#94a3b8">.ai</tspan>
  </text>
  <style>
    @font-face {
      font-family: 'Newsreader';
      font-style: normal;
      font-weight: 700;
      src: url(data:font/woff2;base64,) format('woff2');
    }
    @keyframes pulse {
      0% { transform: scale(1); opacity: 0.8; }
      50% { transform: scale(1.1); opacity: 1; }
      100% { transform: scale(1); opacity: 0.8; }
    }
    .nodes circle {
      animation: pulse 3s infinite ease-in-out;
    }
    .nodes circle:nth-child(2n) {
      animation-delay: 1s;
    }
    .nodes circle:nth-child(3n) {
      animation-delay: 2s;
    }
  </style>
</svg>
